<div class="flex flex-col w-full gap-2 group">
  @if (label()) {
    <label class="font-sans text-xs font-bold uppercase tracking-widest text-[var(--ctrl-text)] opacity-50 group-focus-within:opacity-100 transition-opacity">
      {{ label() }}
    </label>
  }

  <div class="relative flex items-center">
    <input
      [type]="type()"
      [placeholder]="placeholder()"
      [value]="value()"
      (input)="onInput($event)"
      class="ctrl-input-field"
    />
  </div>
</div>
